services:
  postgres:
    image: postgres:16-alpine
    container_name: delivery-os-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery
      POSTGRES_DB: delivery_os
    volumes:
      - delivery_os_pg:/var/lib/postgresql/data

volumes:
  delivery_os_pg:
